<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Градиентный фон -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Круглый фон -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Иконка завода/фабрики -->
  <g fill="white">
    <!-- Здание -->
    <rect x="25" y="45" width="50" height="35" rx="2"/>
    
    <!-- Окна -->
    <rect x="32" y="52" width="8" height="8" fill="#6366f1"/>
    <rect x="46" y="52" width="8" height="8" fill="#6366f1"/>
    <rect x="60" y="52" width="8" height="8" fill="#6366f1"/>
    <rect x="32" y="65" width="8" height="8" fill="#6366f1"/>
    <rect x="46" y="65" width="8" height="8" fill="#6366f1"/>
    <rect x="60" y="65" width="8" height="8" fill="#6366f1"/>
    
    <!-- Труба 1 -->
    <rect x="30" y="30" width="8" height="15" rx="1"/>
    <ellipse cx="34" cy="29" rx="5" ry="3" fill="#e0e7ff"/>
    
    <!-- Труба 2 -->
    <rect x="46" y="25" width="8" height="20" rx="1"/>
    <ellipse cx="50" cy="24" rx="5" ry="3" fill="#e0e7ff"/>
    
    <!-- Труба 3 -->
    <rect x="62" y="32" width="8" height="13" rx="1"/>
    <ellipse cx="66" cy="31" rx="5" ry="3" fill="#e0e7ff"/>
  </g>
</svg>
