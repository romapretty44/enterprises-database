<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База предприятий</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Экран входа -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Вход в систему</h1>
            <p>База предприятий</p>
            <form id="loginForm">
                <input type="password" id="passwordInput" placeholder="Введите пароль" required>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div class="container" style="display: none;">
        <header>
            <h1>📊 База предприятий</h1>
            <div class="sync-status">
                <span id="syncStatus">🔄 Синхронизация...</span>
            </div>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или отрасли...">
            <button id="addBtn" class="btn btn-primary">+ Добавить предприятие</button>
        </div>

        <div class="filters">
            <label><input type="checkbox" class="filter-checkbox" value="промышленность"> Промышленность</label>
            <label><input type="checkbox" class="filter-checkbox" value="судоремонт"> Судоремонт</label>
            <label><input type="checkbox" class="filter-checkbox" value="добыча"> Добыча</label>
            <label><input type="checkbox" class="filter-checkbox" value="обработка"> Обработка</label>
            <label><input type="checkbox" class="filter-checkbox" value="лёгкая промышленность"> Лёгкая промышленность</label>
            <label><input type="checkbox" class="filter-checkbox" value="рыбная отрасль"> Рыбная отрасль</label>
            <label><input type="checkbox" class="filter-checkbox" value="металлургия"> Металлургия</label>
            <label><input type="checkbox" class="filter-checkbox" value="лесная промышленность"> Лесная промышленность</label>
            <label><input type="checkbox" class="filter-checkbox" value="ОПК"> ОПК</label>
            <label><input type="checkbox" class="filter-checkbox" value="машиностроение"> Машиностроение</label>
            <label><input type="checkbox" class="filter-checkbox" value="АПК"> АПК</label>
            <label><input type="checkbox" class="filter-checkbox" value="проект"> Проект</label>
        </div>

        <div id="enterprisesList" class="enterprises-list"></div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Добавить предприятие</h2>
            <form id="enterpriseForm">
                <input type="hidden" id="enterpriseId">
                
                <label for="name">Название предприятия *</label>
                <input type="text" id="name" required>

                <label for="description">Информация о предприятии</label>
                <textarea id="description" rows="5"></textarea>

                <label>Отрасли (можно выбрать несколько) *</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="industries" value="промышленность"> Промышленность</label>
                    <label><input type="checkbox" name="industries" value="судоремонт"> Судоремонт</label>
                    <label><input type="checkbox" name="industries" value="добыча"> Добыча</label>
                    <label><input type="checkbox" name="industries" value="обработка"> Обработка</label>
                    <label><input type="checkbox" name="industries" value="лёгкая промышленность"> Лёгкая промышленность</label>
                    <label><input type="checkbox" name="industries" value="рыбная отрасль"> Рыбная отрасль</label>
                    <label><input type="checkbox" name="industries" value="металлургия"> Металлургия</label>
                    <label><input type="checkbox" name="industries" value="лесная промышленность"> Лесная промышленность</label>
                    <label><input type="checkbox" name="industries" value="ОПК"> ОПК</label>
                    <label><input type="checkbox" name="industries" value="машиностроение"> Машиностроение</label>
                    <label><input type="checkbox" name="industries" value="АПК"> АПК</label>
                    <label><input type="checkbox" name="industries" value="проект"> Проект</label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="script.js"></script>
</body>
</html>
