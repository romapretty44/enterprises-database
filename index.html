<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База предприятий</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Экран авторизации -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🏭 База предприятий</h1>
            <p>Введите пароль для входа</p>
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <p class="hint">☁️ Облачная синхронизация активна</p>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="mainContent" style="display: none;">
        <header>
            <h1>🏭 База предприятий</h1>
            <div class="header-actions">
                <button id="addBtn" class="add-btn">➕ Добавить предприятие</button>
                <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
            </div>
        </header>

        <!-- Поиск и фильтры -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию или описанию...">
            
            <div class="industry-filter" id="industryFilter">
                <h3>Фильтр по отраслям:</h3>
                <label><input type="checkbox" value="Промышленность"> Промышленность</label>
                <label><input type="checkbox" value="Судоремонт"> Судоремонт</label>
                <label><input type="checkbox" value="Добыча"> Добыча</label>
                <label><input type="checkbox" value="Обработка"> Обработка</label>
                <label><input type="checkbox" value="Лёгкая промышленность"> Лёгкая промышленность</label>
                <label><input type="checkbox" value="Рыбная отрасль"> Рыбная отрасль</label>
                <label><input type="checkbox" value="Металлургия"> Металлургия</label>
                <label><input type="checkbox" value="Лесная промышленность"> Лесная промышленность</label>
                <label><input type="checkbox" value="ОПК"> ОПК</label>
                <label><input type="checkbox" value="Машиностроение"> Машиностроение</label>
                <label><input type="checkbox" value="АПК"> АПК</label>
                <label><input type="checkbox" value="Проект"> Проект</label>
            </div>
        </div>

        <!-- Список предприятий -->
        <div id="enterprisesContainer" class="enterprises-container">
            <p style="text-align: center;">Загрузка...</p>
        </div>

        <!-- Модальное окно -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <h2 id="modalTitle">Добавить предприятие</h2>
                
                <div class="form-section">
                    <label>📝 Название предприятия *</label>
                    <input type="text" id="enterpriseName" required placeholder="Введите название...">
                </div>
                
                <div class="form-section">
                    <label>ℹ️ Информация о предприятии</label>
                    <textarea id="enterpriseInfo" rows="8" placeholder="Добавьте подробное описание предприятия..."></textarea>
                </div>
                
                <div class="form-section">
                    <label>🏭 Отрасли (можно выбрать несколько) *</label>
                    <div id="industryCheckboxes" class="industry-checkboxes">
                        <label><input type="checkbox" value="Промышленность"> Промышленность</label>
                        <label><input type="checkbox" value="Судоремонт"> Судоремонт</label>
                        <label><input type="checkbox" value="Добыча"> Добыча</label>
                        <label><input type="checkbox" value="Обработка"> Обработка</label>
                        <label><input type="checkbox" value="Лёгкая промышленность"> Лёгкая промышленность</label>
                        <label><input type="checkbox" value="Рыбная отрасль"> Рыбная отрасль</label>
                        <label><input type="checkbox" value="Металлургия"> Металлургия</label>
                        <label><input type="checkbox" value="Лесная промышленность"> Лесная промышленность</label>
                        <label><input type="checkbox" value="ОПК"> ОПК</label>
                        <label><input type="checkbox" value="Машиностроение"> Машиностроение</label>
                        <label><input type="checkbox" value="АПК"> АПК</label>
                        <label><input type="checkbox" value="Проект"> Проект</label>
                    </div>
                </div>
                
                <button id="saveBtn" class="save-btn">💾 Сохранить</button>
            </div>
        </div>

        <footer>
            <p>☁️ Все данные синхронизируются в реальном времени между всеми пользователями</p>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
